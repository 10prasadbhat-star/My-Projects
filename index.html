<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Request Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <!-- input form container -->   
    <div class="container inputForm">
        <form class="form-body my-3" id="employeeForm">
            <h3>Employee Request Form </h3>
            <div class="mb-3" id="empID">
                <label for="exampleInputEmail1" class="form-label">Employee ID<span>*</span></label>
                <input type="number" class="form-control" id="employeeID" aria-describedby="emailHelp">
            </div>
            <div class="mb-3" id="emp">
                <label for="exampleInputEmail1" class="form-label">Employee Name<span>*</span></label>
                <input type="text" class="form-control" id="employeeName" aria-describedby="emailHelp">

            </div>

            <div class="mb-3" id="request1">
                <label for="exampleInputEmail1" class="form-label">Request Type<span>*</span></label>
                <select id="request" aria-label="Default select example">
                    <option value="All" class="request">All</option>
                    <option value="Leave" class="request">Leave</option>
                    <option value="Expense" class="request">Expense</option>
                    <option value="Access" class="request">Access</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="3"></textarea>
            </div>

            <div class="mb-3" id="start">
                <label for="exampleFormControlTextarea1" class="form-label">Start Date<span>*</span></label>
                <input type="date" id="start-date" value="">
            </div>

            <div class="mb-3" id="end">
                <label for="exampleFormControlTextarea1" class="form-label">End Date<span>*</span></label>
                <input type="date" id="end_date" value="">
            </div>
            <div class="mb-3" id="priority1">
                <label for="exampleInputEmail1" class="form-label">Priority<span>*</span></label>
                <select id="priority" aria-label="Default select example">
                    <option value="All">All</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            <div class="buttons">
                <button type="cancel" class="btn btn-danger m-1">Cancel</button>
                <button type="submit" class="btn btn-success m-1" id="submit">Submit</button>
            </div>
        </form>
    </div>

    <!-- filter container  -->
    <div class="container mt-3 card-body table-responsive filter-card">
        <div class="row table-responsive card-body">
            <section class="filters col-6 w-25">
                <label for="exampleInputEmail1" class="form-label">Filter by Status:</label>
                <select id="selectStatus" class="form-select" aria-label="Default select example">
                    <option value="All">All</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </section>
            <div class="col-6 w-50">
                <label for="exampleInputEmail1" class="form-label">Search by (Employee Name or ID)</label>
                <input id="searchInput" class="form-control me-2" type="search" placeholder="Search"
                    aria-label="Search">
            </div>
        </div>
        <!-- Table with data after rendering  -->
        <div class="card mt-3">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered align-middle text-center">
                        <thead class="table-secondary">
                            <tr>
                                <th scope="col">Request ID</th>
                                <th scope="col">Employee Name</th>
                                <th scope="col">Type</th>
                                <th scope="col">Start Date</th>
                                <th scope="col">End Date</th>
                                <th scope="col">Priority</th>
                                <th scope="col">Status</th>
                                <th scope="col">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tbody">



                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>

</html>
